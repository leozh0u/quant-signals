name: news
on:
  schedule:
    - cron: "17 */6 * * *"  # every 6h; RSS feeds hold ~20 items so this is plenty
  workflow_dispatch:
permissions:
  contents: write
jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: qs-news --news-dir news --universe universe.txt
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news/
          git diff --cached --quiet || git commit -m "news: scheduled headline pull"
          git push
